<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="keywords" content="Ilaria Chillotti, cryptology, FHE, fully homomorphic encryption, MPC, Desilo">
  <meta name="robots" content="index, follow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  {% seo %}
  <style>
    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Base ── */
    html { font-size: 16px; scroll-behavior: smooth; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: #eae8e3;
      color: #444;
      line-height: 1.72;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Layout shell ── */
    .outer { width: 100%; }
    .inner { width: 760px; max-width: 100%; margin: 0 auto; padding: 0 24px; }

    /* ── Header ── */
    #header_wrap {
      background: #252525;
      background: linear-gradient(160deg, #1f1f1f 0%, #484848 100%);
      padding: 30px 0 22px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.35);
    }
    #project_title {
      font-size: 2.2rem; font-weight: 700;
      color: #f5f5f5; letter-spacing: -0.3px;
      margin-bottom: 7px; line-height: 1.2;
    }
    #project_tagline {
      font-size: 0.88rem; font-weight: 300;
      color: rgba(255,255,255,0.58); letter-spacing: 0.4px;
    }

    /* ── Navigation ── */
    #nav_wrap {
      background: #eae8e3;
      border-bottom: 1px solid rgba(192,82,82,0.22);
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 1px 5px rgba(0,0,0,0.07);
    }
    #nav_wrap nav { display: flex; flex-wrap: wrap; gap: 2px; padding: 7px 0; }
    #nav_wrap a,
    #nav_wrap a:link,
    #nav_wrap a:visited {
      font-size: 0.74rem; font-weight: 600;
      color: #c05252; text-decoration: none;
      padding: 4px 11px; border-radius: 20px;
      letter-spacing: 0.1px; display: inline-block;
      transition: background 0.15s ease, color 0.15s ease;
    }
    #nav_wrap a:hover { background: #fce8e8; color: #8c2e2e; text-decoration: none; }

    /* ── Main content ── */
    #main_content_wrap { background: #eae8e3; }
    #main_content {
      padding: 34px 0 64px;
      min-height: 65vh;
      animation: pageIn 0.28s ease-out both;
    }
    @keyframes pageIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0);   }
    }

    /* ── Headings ── */
    #main_content h1 {
      font-size: 1.75rem; font-weight: 700;
      color: #1a1a1a; margin: 0 0 18px;
      letter-spacing: -0.2px; line-height: 1.25;
    }
    #main_content h2 {
      font-size: 1.18rem; font-weight: 600;
      color: #1a1a1a; margin: 30px 0 10px;
      padding-bottom: 6px; border-bottom: 2px solid #ccc9c3;
    }
    #main_content h3 {
      font-size: 1.04rem; font-weight: 600;
      color: #222; margin: 22px 0 7px;
    }
    #main_content h4 {
      font-size: 0.77rem; font-weight: 700;
      color: #999; text-transform: uppercase;
      letter-spacing: 0.9px; margin: 26px 0 7px;
    }

    /* ── Body text ── */
    #main_content p  { margin: 0 0 13px; }
    #main_content ul,
    #main_content ol { margin: 0 0 13px; padding-left: 22px; }
    #main_content li { margin-bottom: 5px; }
    #main_content li > ul,
    #main_content li > ol { margin-top: 4px; margin-bottom: 4px; }
    #main_content strong { font-weight: 600; color: #1a1a1a; }
    #main_content em     { font-style: italic; color: #555; }

    /* ── Content links ── */
    #main_content a,
    #main_content a:link,
    #main_content a:visited { color: #c05252; text-decoration: none; transition: color 0.14s; }
    #main_content a:hover   { color: #8c2e2e; text-decoration: underline; }

    /* ── HR & images ── */
    #main_content hr  { border: none; border-top: 1px solid #ccc9c3; margin: 22px 0; }
    #main_content img { max-width: 100%; height: auto; }

    /* ── Code ── */
    #main_content code {
      font-family: Menlo, Consolas, 'Liberation Mono', monospace;
      font-size: 0.875em; background: #dedad4;
      padding: 2px 6px; border-radius: 3px; color: #333;
    }
    #main_content pre {
      background: #dedad4; border-radius: 5px;
      padding: 16px; overflow-x: auto; margin: 0 0 14px;
    }
    #main_content pre code { background: none; padding: 0; font-size: 0.85rem; }

    /* ── Footer ── */
    #footer_wrap { background: #252525; padding: 18px 0; text-align: center; }
    #footer_wrap p { font-size: 0.77rem; color: rgba(255,255,255,0.35); }
    #footer_wrap a,
    #footer_wrap a:link,
    #footer_wrap a:visited { color: rgba(255,255,255,0.48); text-decoration: none; }
    #footer_wrap a:hover   { color: rgba(255,255,255,0.82); }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      .inner { padding: 0 16px; }
      #project_title { font-size: 1.65rem; }
      #main_content { padding: 22px 0 48px; }
      #main_content h1 { font-size: 1.4rem; }
      #main_content h2 { font-size: 1.05rem; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div id="header_wrap" class="outer">
    <header class="inner">
      <h1 id="project_title">{{ site.title | default: 'Ilaria Chillotti' }}</h1>
      <p id="project_tagline">PhD &middot; Researcher in Cryptography &middot; FHE &middot; DESILO Inc.</p>
    </header>
  </div>

  <!-- Navigation -->
  <div id="nav_wrap" class="outer">
    <nav class="inner">
      <a href="./">Home</a>
      <a href="./publications.html">Publications</a>
      <a href="./open-source_development.html">Open-Source</a>
      <a href="./blogposts.html">Blog</a>
      <a href="./vulgarization.html">Vulgarization</a>
      <a href="./awards.html">Awards</a>
      <a href="./talks_panels_schools.html">Talks &amp; Schools</a>
      <a href="./committees.html">Committees</a>
      <a href="./teaching.html">Teaching</a>
    </nav>
  </div>

  <!-- Main content -->
  <div id="main_content_wrap" class="outer">
    <section id="main_content" class="inner">
      {{ content }}
    </section>
  </div>

  <!-- Footer -->
  <div id="footer_wrap" class="outer">
    <footer class="inner">
      <p>&copy; {{ site.title }} &mdash; hosted on <a href="https://pages.github.com" target="_blank">GitHub Pages</a></p>
    </footer>
  </div>

  <script>
    (function () {
      var wrap = document.getElementById('main_content_wrap');
      wrap.style.transition = 'opacity 0.18s ease';
      document.addEventListener('click', function (e) {
        var link = e.target.closest('a[href]');
        if (!link) return;
        var href = link.getAttribute('href');
        if (!href || href.charAt(0) === '#' || /^(https?:|mailto:|\/\/)/.test(href) || link.target === '_blank' || e.ctrlKey || e.metaKey || e.shiftKey) return;
        e.preventDefault();
        wrap.style.opacity = '0';
        setTimeout(function () { window.location.href = href; }, 180);
      });
    })();
  </script>

</body>
</html>
